name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: gh-pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Finalize
        env:
          A9C2D2: ${{ secrets.A9C2D2 }}
          B4D080: ${{ secrets.B4D080 }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" ./_site
          python3 -c "
          import os, sys, pathlib
          a, b = os.environ.get('A9C2D2', ''), os.environ.get('B4D080', '')
          total = 0
          for html in pathlib.Path('_site').rglob('*.html'):
              try:
                  text = html.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              patched = text
              if a:
                  patched = patched.replace('<!-- 258899eb79f1f70f0a5316641cc5545f99cd -->', a)
              if b:
                  patched = patched.replace('<!-- d995438d47c7ef454c40e2922c -->', b)
              if patched != text:
                  html.write_text(patched, encoding='utf-8')
                  total += 1
          if total == 0 and (a or b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: pages-deploy
        uses: actions/deploy-pages@v4
